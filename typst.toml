[package]
name = "unob-thesis"
version = "1.0.0"
entrypoint = "src/lib.typ"
authors = [ "AR <https://github.com/ShinoYumi>" ]
license = "MIT"
description = "Oficiální a plně vybavená šablona v sázecím systému Typst, určená pro tvorbu bakalářských, diplomových a disertačních prací na Univerzitě obrany. Byla navržena tak, aby maximálně zjednodušila formátování, automatizovala generování povinných částí a zajistila 100% soulad s oficiálními směrnicemi."
repository = "https://github.com/ShinoYumi/unob-typst-template"
keywords = [ "Závěrečná práce", "UNOB", "Univerzita obrany" ]
categories = [ "thesis" ]
disciplines = ["education", "engineering"]
compiler = "0.14.0"
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".typstignore",
  "Justfile",
  "references"
]

[template]
path = "template"
entrypoint = "thesis.typ"
thumbnail = "thumbnail.png"

[tool.tytanic]
tests = "tests"

[tool.tytanic.default]
dir = "ltr"
ppi = 144.0
max-delta = 1
max-deviations = 0
