name: Tytanic Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tytanic
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: tytanic@0.3.3

      - name: Run phase test suite
        run: |
          # 1. Najdeme cestu k nainstalované binárce 'tytanic'
          TYTANIC_BIN=$(which tytanic)
          
          # 2. Vytvoříme v systému alias 'tt', který skript vyžaduje
          sudo ln -sf "$TYTANIC_BIN" /usr/local/bin/tt
          
          # 3. Nastavíme proměnnou prostředí TT pro skript
          export TT="/usr/local/bin/tt"
          
          # 4. Zajistíme, že testovací skript je spustitelný
          chmod +x scripts/test-phases.sh
          
          # 5. Spustíme testy
          ./scripts/test-phases.sh

      - name: Archive test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tytanic-artifacts
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
            tests/**/ref/*.png
          retention-days: 5