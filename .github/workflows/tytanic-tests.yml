name: Tytanic Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tytanic
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: tytanic@0.3.3

      - name: Run phase test suite
        run: |
          # Zjistíme, kde přesně binárka je, a nastavíme TT
          # Cargo install dává binárky do ~/.cargo/bin/
          export TT=$(which tytanic || which tt)
          scripts/test-phases.sh
        env:
          # Pokud skript vyžaduje TT jako env proměnnou, 
          # nasměrujeme ji na nainstalovanou binárku
          TT: tytanic

      - name: Archive test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tytanic-artifacts
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
            tests/**/ref/*.png
          retention-days: 5